<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>포토 캘린더</title>
    <style>
      .wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .title_wrapper {
        width: 100%;
      }
      img {
        width: 80%;
        height: 200px;
        object-fit: cover;
        object-position: bottom;
      }
      table {
        width: 80%;
        text-align: center;
      }
      th {
        width: 14%;
      }
      th:first-child,
      td:first-child {
        color: #ff4646;
      }
      th:last-child,
      td:last-child {
        color: #4646ff;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="title_wrapper">
        <h1>포토 캘린더</h1>
        <h2>2026년 4월</h2>
      </div>
      <img src="images/april.jpg" alt="2026년 4월 포토 캘린더" />
      <table border="1" cellpadding="5" cellspacing="0">
        <tr>
          <th>Sun</th>
          <th>Mon</th>
          <th>Tue</th>
          <th>Wed</th>
          <th>Thu</th>
          <th>Fri</th>
          <th>Sat</th>
        </tr>
        <tr>
          <td></td>
          <td></td>
          <td>1</td>
          <td>2</td>
          <td>3</td>
          <td>4</td>
          <td>5</td>
        </tr>
        <tr>
          <td>6</td>
          <td>7</td>
          <td>8</td>
          <td>9</td>
          <td>10</td>
          <td>11</td>
          <td>12</td>
        </tr>
        <tr>
          <td>13</td>
          <td>14</td>
          <td>15</td>
          <td>16</td>
          <td>17</td>
          <td>18</td>
          <td>19</td>
        </tr>
        <tr>
          <td>20</td>
          <td>21</td>
          <td>22</td>
          <td>23</td>
          <td>24</td>
          <td>25</td>
          <td>26</td>
        </tr>
        <tr>
          <td>27</td>
          <td>28</td>
          <td>29</td>
          <td>30</td>
          <td></td>
          <td></td>
          <td></td>
        </tr>
      </table>
    </div>
  </body>
</html>
