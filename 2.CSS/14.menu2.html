<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>14 menu2</title>
    <style>
      ul {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        gap: 10px;
      }

      li {
        flex: 1;
        text-align: center;
      }

      li a {
        display: block;
        text-decoration: none;
      }

      li a:hover {
        background-color: #555;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <ul>
      <li><a href="#">Home</a></li>
      <li><a href="#">News</a></li>
      <li><a href="#">Content</a></li>
      <li><a href="#">About</a></li>
    </ul>
  </body>
</html>
