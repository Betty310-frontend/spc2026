<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Document</title>
    <style>
      p {
        color: green;
      }
      .my_bg_yellow {
        border: 10px double red;
        background-color: yellow;
      }
      .my_text_pink {
        color: pink;
      }
      .my_text_blue {
        color: blue;
      }
      #my_bg_orange {
        background-color: orange;
      }
    </style>
  </head>
  <body>
    <h1>CSS 연습</h1>
    <p class="my_bg_yellow" id="my_bg_orange">여기는 아무 문장이나 적으시오.</p>
    <p class="my_text_pink">여기는 아무 문장이나 적으시오.</p>
    <p class="my_bg_yellow my_text_blue">여기는 아무 문장이나 적으시오.</p>
    <p>여기는 아무 문장이나 적으시오.</p>
    <p class="my_text_blue my_text_pink">여기는 아무 문장이나 적으시오.</p>
  </body>
</html>
