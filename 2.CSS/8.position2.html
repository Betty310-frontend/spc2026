<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>8. position2</title>
    <style>
      .bg {
        height: 300px;
        background-color: orange;
      }
      .center {
        background-color: orangered;
      }
      .fixed {
        width: 100px;
        height: 100px;
        background-color: white;
        position: fixed;
        bottom: 50px;
        right: 50px;
        background-image: url("./images/starbucks.svg");
        background-size: contain;
        background-position: center;
        background-repeat: no-repeat;
      }
    </style>
  </head>
  <body>
    <div class="bg"></div>
    <div class="bg center"></div>
    <div class="bg"></div>
    <div class="fixed"></div>
    <script>
      const elem = document.querySelector(".fixed");

      elem.onclick = () => {
        elem.style.transform =
          elem.style.transform === "scale(0.8)" ? "scale(1)" : "scale(0.8)";
      };
    </script>
  </body>
</html>
