<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2. Button</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <h1 class="text-2xl font-bold">버튼들</h1>
    <div class="p-4 space-y-4">
      <p
        class="text-red-700 border border-blue-500 m-4 p-4 rounded-xl shadow-lg shadow-red-800"
      >
        빨간색 글자
      </p>

      <button
        class="bg-blue-500 text-white font-bold py-2 px-4 rounded cursor-pointer hover:bg-blue-700"
      >
        버튼1
      </button>
      <button
        class="bg-blue-400 text-white font-bold py-2 px-4 rounded cursor-pointer hover:bg-blue-600"
      >
        버튼2
      </button>
      <button
        class="bg-blue-300 text-white font-bold py-2 px-4 rounded cursor-pointer hover:bg-blue-500"
      >
        버튼3
      </button>

      <button
        class="bg-blue-200 text-gray-500 font-bold py-2 px-4 rounded cursor-pointer hover:bg-blue-400"
      >
        버튼4
      </button>

      <button
        class="bg-blue-100 text-gray-500 font-bold py-2 px-4 rounded cursor-pointer hover:bg-blue-300"
      >
        버튼5
      </button>
    </div>

    <div class="p-4 space-y-4">
      <button
        class="bg-green-500 text-white font-bold py-2 px-4 rounded cursor-pointer hover:bg-green-700"
      >
        버튼1
      </button>
      <button
        class="bg-green-400 text-white font-bold py-2 px-4 rounded cursor-pointer hover:bg-green-600"
      >
        버튼2
      </button>
      <button
        class="bg-green-300 text-white font-bold py-2 px-4 rounded cursor-pointer hover:bg-green-500"
      >
        버튼3
      </button>

      <button
        class="bg-green-200 text-gray-500 font-bold py-2 px-4 rounded cursor-pointer hover:bg-green-400"
      >
        버튼4
      </button>

      <button
        class="bg-green-100 text-gray-500 font-bold py-2 px-4 rounded cursor-pointer hover:bg-green-300"
      >
        버튼5
      </button>
    </div>

    <div class="p-4 space-y-4">
      <button
        class="bg-red-500 text-white font-bold py-2 px-4 rounded cursor-pointer hover:bg-red-700"
      >
        버튼1
      </button>
      <button
        class="bg-red-400 text-white font-bold py-2 px-4 rounded cursor-pointer hover:bg-red-600"
      >
        버튼2
      </button>
      <button
        class="bg-red-300 text-white font-bold py-2 px-4 rounded cursor-pointer hover:bg-red-500"
      >
        버튼3
      </button>

      <button
        class="bg-red-200 text-gray-500 font-bold py-2 px-4 rounded cursor-pointer hover:bg-red-400"
      >
        버튼4
      </button>

      <button
        class="bg-red-100 text-gray-500 font-bold py-2 px-4 rounded cursor-pointer hover:bg-red-300"
      >
        버튼5
      </button>
    </div>
  </body>
</html>
