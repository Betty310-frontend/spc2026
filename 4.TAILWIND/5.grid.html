<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>5. Grid Layout</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <div class="container mx-auto p-4">
      <h1 class="text-2xl">그리드 / 반응형</h1>

      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 my-4">
        <div class="bg-blue-500 text-white p-4 rounded">컬럼 1</div>
        <div class="bg-green-500 text-white p-4 rounded">컬럼 2</div>
        <div class="bg-yellow-500 text-white p-4 rounded">컬럼 3</div>
        <div class="bg-red-500 text-white p-4 rounded">컬럼 4</div>
      </div>

      <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 my-4">
        <div class="bg-orange-300 text-white p-4 rounded">컬럼 1</div>
        <div class="bg-lime-300 text-white p-4 rounded">컬럼 2</div>
        <div class="bg-cyan-300 text-white p-4 rounded">컬럼 3</div>
        <div class="bg-rose-300 text-white p-4 rounded">컬럼 4</div>
      </div>
    </div>
  </body>
</html>
