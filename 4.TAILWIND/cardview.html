<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>카드뷰 사이트</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-gray-100 min-h-screen flex items-center justify-center p-8">
    <section class="w-full max-w-6xl">
      <h1 class="text-3xl font-bold text-center text-gray-800 mb-10">
        카드뷰 갤러리
      </h1>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        <!-- 카드 1 -->
        <div
          class="bg-white rounded-2xl shadow-lg overflow-hidden opacity-70 hover:opacity-100 hover:-translate-y-1 transition duration-300"
        >
          <img
            src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=800&q=80"
            alt="자연 풍경 이미지"
            class="w-full h-56 object-cover"
          />
          <div class="p-5">
            <h2 class="text-xl font-semibold text-gray-800 mb-2">자연 풍경</h2>
            <p class="text-gray-600">
              푸른 자연과 시원한 분위기를 담은 카드입니다. 호버하면 더 선명하게
              보이도록 구성했습니다.
            </p>
          </div>
        </div>

        <!-- 카드 2 -->
        <div
          class="bg-white rounded-2xl shadow-lg overflow-hidden opacity-70 hover:opacity-100 hover:-translate-y-1 transition duration-300"
        >
          <img
            src="https://images.unsplash.com/photo-1494526585095-c41746248156?auto=format&fit=crop&w=800&q=80"
            alt="도시 야경 이미지"
            class="w-full h-56 object-cover"
          />
          <div class="p-5">
            <h2 class="text-xl font-semibold text-gray-800 mb-2">도시 야경</h2>
            <p class="text-gray-600">
              세련된 도시 감성을 표현한 카드입니다. 기본 상태에서는 살짝
              투명하게 보이도록 했습니다.
            </p>
          </div>
        </div>

        <!-- 카드 3 -->
        <div
          class="bg-white rounded-2xl shadow-lg overflow-hidden opacity-70 hover:opacity-100 hover:-translate-y-1 transition duration-300"
        >
          <img
            src="https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&w=800&q=80"
            alt="인물 라이프스타일 이미지"
            class="w-full h-56 object-cover"
          />
          <div class="p-5">
            <h2 class="text-xl font-semibold text-gray-800 mb-2">
              라이프스타일
            </h2>
            <p class="text-gray-600">
              감성적인 분위기의 카드 예시입니다. 마우스를 올리면 카드가 더
              진하게 강조됩니다.
            </p>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
