<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인 폼</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="min-h-screen bg-gray-100 flex items-center justify-center">
    <div class="relative w-[35vw] min-w-[320px] max-w-[520px]">
      <!-- 검은색 그라데이션 그림자 레이어 -->
      <div
        class="absolute inset-0 translate-x-4 translate-y-4 rounded-2xl bg-gradient-to-br from-black/60 via-black/35 to-black/10 blur-md"
      ></div>

      <!-- 메인 로그인 박스 -->
      <div
        class="relative bg-white border border-gray-200 rounded-2xl p-8 z-10"
      >
        <h1 class="text-2xl font-bold text-gray-900 mb-6 text-center">Login</h1>

        <form class="space-y-5">
          <div>
            <label
              for="username"
              class="block text-sm font-medium text-gray-700 mb-2"
            >
              Username
            </label>
            <input
              id="username"
              type="text"
              placeholder="Enter your username"
              class="w-full rounded-xl border border-gray-300 px-4 py-3 outline-none transition focus:border-gray-700 focus:ring-2 focus:ring-gray-300"
            />
          </div>

          <div>
            <label
              for="password"
              class="block text-sm font-medium text-gray-700 mb-2"
            >
              Password
            </label>
            <input
              id="password"
              type="password"
              placeholder="Enter your password"
              class="w-full rounded-xl border border-gray-300 px-4 py-3 outline-none transition focus:border-gray-700 focus:ring-2 focus:ring-gray-300"
            />
          </div>

          <button
            type="submit"
            class="w-full rounded-xl bg-gray-900 text-white py-3 font-semibold transition hover:bg-black active:scale-[0.99]"
          >
            로그인
          </button>
        </form>
      </div>
    </div>
  </body>
</html>
