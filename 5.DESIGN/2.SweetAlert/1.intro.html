<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>1 Intro</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>
  <body>
    <h1>간단한 Alert 테스트</h1>

    <button onclick="inputPrompt()">버튼</button>

    <script>
      function showAlert() {
        console.log("버튼이 클릭되었습니다.");
        Swal.fire({
          title: "알림",
          text: "이것은 SweetAlert2입니다.",
          icon: "info",
          confirmButtonText: "확인",
        });
      }

      function basicAlert() {
        Swal.fire("알림", "이것은 SweetAlert2입니다.", "success", "확인");
      }

      function confirmAlert() {
        Swal.fire({
          title: "정말 삭제하시겠습니까?",
          text: "이 작업은 되돌릴 수 없습니다.",
          icon: "warning",
          showCancelButton: true,
          confirmButtonText: "삭제",
          cancelButtonText: "취소",
        }).then(({ isConfirmed, isDismissed }) => {
          if (isConfirmed) {
            Swal.fire("삭제되었습니다.", "", "success");
          } else if (isDismissed) {
            Swal.fire("취소되었습니다.", "", "error");
          }
        });
      }

      // 이름 입력 후 확인하는 Alert 미노출
      function inputPrompt() {
        const { value } = Swal.fire({
          title: "이름을 입력하세요.",
          input: "text",
          showCancelButton: true,
          inputValidator: (value) => {
            if (!value) return "이름을 작성해주세요!";
          },
          inputPlaceholder: "이름 입력...",
        }).then(({ value }) => {
          if (value)
            Swal.fire(`입력한 이름은 <strong>${value}</strong>입니다.`);
        });
      }
    </script>
  </body>
</html>
